<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNCT 안전서류 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');

:root {
  --navy: #0d1b3e;
  --navy-mid: #1a2f5e;
  --blue: #1565c0;
  --accent: #00bcd4;
  --bg: #f0f4f8;
  --white: #ffffff;
  --gray-100: #f5f7fa;
  --gray-200: #e8edf3;
  --gray-300: #cdd5e0;
  --gray-400: #9aa5b4;
  --gray-700: #3d4f61;
  --text: #1a2332;
  --danger: #c62828;
  --success: #2e7d32;
  --border: #cbd5e0;
  --shadow: 0 4px 24px rgba(13,27,62,0.12);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--blue) 100%);
  color: white; padding: 0;
  box-shadow: 0 4px 20px rgba(13,27,62,0.4);
  position: sticky; top: 0; z-index: 1000;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px; max-width: 1600px; margin: 0 auto;
}
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-badge {
  background: var(--accent); color: var(--navy);
  font-weight: 900; font-size: 16px; padding: 6px 14px;
  border-radius: 6px; letter-spacing: 1px;
}
.logo-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
.logo-sub { font-size: 11px; opacity: 0.65; margin-top: 2px; }
.header-status { display: flex; align-items: center; gap: 8px; font-size: 12px; opacity: 0.8; }
.status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

/* LAYOUT */
.app-layout { display: flex; max-width: 1600px; margin: 0 auto; min-height: calc(100vh - 65px); }

/* SIDEBAR */
.sidebar {
  width: 320px; min-width: 320px; background: var(--white);
  border-right: 1px solid var(--gray-200); padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
  position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto;
}
.section-card { background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
.section-card-header {
  background: var(--navy); color: white; padding: 10px 16px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
}
.section-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
.form-group input[type="number"],
.form-group input[type="text"],
.form-group select {
  width: 100%; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
  transition: border-color 0.2s; background: white;
}
.form-group input:focus { outline: none; border-color: var(--blue); }

.checkbox-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
  border: 1.5px solid var(--border); background: white;
}
.checkbox-item:hover { background: #e8f0fe; border-color: var(--blue); }
.checkbox-item.checked { background: #e8f0fe; border-color: var(--blue); }
.checkbox-item input { display: none; }
.checkbox-box {
  width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.checkbox-item.checked .checkbox-box { background: var(--blue); border-color: var(--blue); color: white; font-size: 11px; }
.checkbox-label { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }

.btn-generate {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--blue), var(--navy));
  color: white; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 12px rgba(21,101,192,0.3);
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(21,101,192,0.4); }
.btn-generate:active { transform: translateY(0); }

.btn-pdf {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--danger), #8b0000);
  color: white; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: transform 0.15s; box-shadow: 0 4px 12px rgba(198,40,40,0.3);
}
.btn-pdf:hover { transform: translateY(-1px); }
.btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.doc-nav { display: flex; flex-direction: column; gap: 4px; }
.doc-nav-item {
  padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent; color: var(--gray-700);
}
.doc-nav-item:hover { background: var(--gray-200); }
.doc-nav-item.active { background: #e8f0fe; border-color: var(--blue); color: var(--blue); font-weight: 700; }

/* MAIN CONTENT */
.main-content { flex: 1; padding: 32px; overflow-y: auto; }

/* WELCOME SCREEN */
.welcome-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: calc(100vh - 65px);
  text-align: center; position: relative; overflow: hidden;
  background: linear-gradient(145deg, #003087 0%, #0d47a1 40%, #01579b 70%, #002060 100%);
}
.logo-anim { animation: fadeDown 0.9s cubic-bezier(.22,1,.36,1) both; }
.line-anim { animation: expandLine 1.1s cubic-bezier(.22,1,.36,1) 0.3s both; transform-origin: center; }
.title-anim { animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.4s both; }
.hint-anim { animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.7s both; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
@keyframes expandLine { from{opacity:0;transform:scaleX(0)} to{opacity:1;transform:scaleX(1)} }

.doc-section { display: none; }
.doc-section.active { display: block; }

.doc-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--gray-200);
}
.doc-title { font-size: 20px; font-weight: 800; color: var(--navy); }
.doc-subtitle { font-size: 13px; color: var(--gray-400); margin-top: 2px; }

/* DOCUMENT PAGE */
.document-page {
  background: white; width: 100%; max-width: 794px;
  margin: 0 auto 40px; padding: 40px;
  box-shadow: var(--shadow); border-radius: 4px;
  border: 1px solid var(--gray-200); font-family: 'Noto Sans KR', sans-serif; position: relative;
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #999; margin-top: 12px; }
.info-cell { display: flex; align-items: center; border-bottom: 1px solid #999; border-right: 1px solid #999; min-height: 32px; }
.info-cell:nth-child(2n) { border-right: none; }
.info-label { min-width: 60px; font-size: 12px; font-weight: 700; padding: 4px 8px; background: #f5f5f5; border-right: 1px solid #999; align-self: stretch; display: flex; align-items: center; }
.info-input { flex: 1; border: none; outline: none; padding: 4px 8px; font-size: 12px; font-family: inherit; background: transparent; width: 100%; }
.info-input:focus { background: #fffde7; }

/* SIGNATURE */
.sig-area { border: 2px dashed var(--border); border-radius: 8px; background: #fafafa; position: relative; overflow: hidden; }
.sig-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 12px; color: #ccc; pointer-events: none; white-space: nowrap; }
.sig-canvas { display: block; cursor: crosshair; touch-action: none; }
.sig-clear-btn { position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.9); border: 1px solid var(--border); border-radius: 4px; font-size: 10px; padding: 2px 6px; cursor: pointer; color: var(--danger); }

/* PERMIT */
.permit-header-row { display: flex; align-items: center; margin-bottom: 16px; gap: 12px; }
.permit-badge { background: #c62828; color: white; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 3px; letter-spacing: 0.5px; }
.permit-title-main { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
.permit-no-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.permit-no-box { border: 2px solid #000; border-radius: 4px; display: flex; align-items: center; overflow: hidden; }
.permit-no-label { background: #003087; color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; }
.permit-no-input { border: none; outline: none; padding: 4px 10px; font-size: 12px; font-family: inherit; width: 120px; }
.permit-section { margin-bottom: 12px; }
.permit-section-title { background: #003087; color: white; font-size: 11px; font-weight: 700; padding: 5px 12px; margin-bottom: 0; letter-spacing: 0.5px; }
.permit-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.permit-table th, .permit-table td { border: 1px solid #999; padding: 5px 8px; vertical-align: top; }
.permit-table th { background: #f0f0f0; font-weight: 700; text-align: left; width: 100px; font-size: 11px; }
.permit-table input[type="text"],.permit-table input[type="date"],.permit-table input[type="time"],.permit-table select { width: 100%; border: none; outline: none; font-size: 11px; font-family: inherit; background: transparent; padding: 0; }
.permit-table input:focus { background: #fffde7; }
.check-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
.check-table th,.check-table td { border: 1px solid #999; padding: 4px 8px; }
.check-table th { background: #f0f0f0; font-weight: 700; font-size: 10.5px; }
.check-td-center { text-align: center; width: 36px; }
.check-cb { cursor: pointer; }
.notice-box { background: #fff8e1; border: 1px solid #ffd54f; border-radius: 4px; padding: 8px 12px; font-size: 10.5px; margin-bottom: 10px; line-height: 1.6; }
.sig-inline { display: flex; gap: 0; border: 1px solid #999; }
.sig-inline-item { flex: 1; border-right: 1px solid #999; padding: 6px; }
.sig-inline-item:last-child { border-right: none; }
.sig-inline-label { font-size: 10px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; }
.pledge-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 11.5px; }
.pledge-table td { padding: 6px 8px; border: 1px solid #999; line-height: 1.5; vertical-align: top; }
.page-indicator { text-align: right; font-size: 10px; color: var(--gray-400); margin-top: 12px; border-top: 1px solid var(--gray-200); padding-top: 8px; }

/* TOAST */
.toast-container { position: fixed; top: 80px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--navy); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; max-width: 320px; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; box-shadow: 0 16px 64px rgba(0,0,0,0.3); }
.modal-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 16px; }
.modal-body { font-size: 14px; color: var(--gray-700); line-height: 1.6; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.btn-modal-cancel { padding: 10px 20px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-family: inherit; cursor: pointer; }
.btn-modal-confirm { padding: 10px 20px; border-radius: 8px; border: none; background: var(--blue); color: white; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

@media print {
  .app-header,.sidebar,.doc-header { display: none !important; }
  .main-content { padding: 0; }
  .document-page { box-shadow: none; border: none; margin: 0; max-width: 100%; page-break-after: always; }
  .sig-clear-btn { display: none; }
}
@media (max-width: 900px) {
  .app-layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; position: relative; top: 0; height: auto; }
  .main-content { padding: 16px; }
  .document-page { padding: 20px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-badge">BNCT</div>
      <div>
        <div class="logo-title">안전서류 통합관리 시스템</div>
        <div class="logo-sub">Busan New Container Terminal · Safety Document Management</div>
      </div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      시스템 정상 운영 중
    </div>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar">
    <div class="section-card">
      <div class="section-card-header">서류 생성 설정</div>
      <div class="section-card-body">
        <div class="form-group">
          <label>작업 인원 수</label>
          <input type="number" id="workerCount" value="1" min="1" max="30" placeholder="인원 수 입력">
        </div>
        <div class="form-group">
          <label>공사명</label>
          <input type="text" id="projectName" placeholder="공사명 입력">
        </div>
        <div class="form-group">
          <label>소속 업체</label>
          <input type="text" id="companyName" placeholder="소속 업체명 입력">
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header">추가 작업허가서 선택</div>
      <div class="section-card-body">
        <label class="checkbox-item" id="chk-electric-wrap">
          <input type="checkbox" id="chk-electric">
          <div class="checkbox-box" id="box-electric">✓</div>
          <div class="checkbox-label">전기 유지보수 작업 양식</div>
        </label>
        <label class="checkbox-item" id="chk-hotwork-wrap">
          <input type="checkbox" id="chk-hotwork">
          <div class="checkbox-box" id="box-hotwork">✓</div>
          <div class="checkbox-label">화기작업 양식</div>
        </label>
        <label class="checkbox-item" id="chk-height-wrap">
          <input type="checkbox" id="chk-height">
          <div class="checkbox-box" id="box-height">✓</div>
          <div class="checkbox-label">고소작업 양식</div>
        </label>
        <label class="checkbox-item" id="chk-lifting-wrap">
          <input type="checkbox" id="chk-lifting">
          <div class="checkbox-box" id="box-lifting">✓</div>
          <div class="checkbox-label">기계적 인양 작업 양식</div>
        </label>
      </div>
    </div>

    <button class="btn-generate" onclick="generateForms()">서류 생성하기</button>

    <div id="docNavSection" style="display:none;">
      <div style="font-size:11px;font-weight:700;color:var(--gray-400);margin-bottom:8px;letter-spacing:0.5px;">생성된 문서 목록</div>
      <div class="doc-nav" id="docNav"></div>
    </div>

    <div id="pdfSection" style="display:none;">
      <div class="section-card">
        <div class="section-card-header">담당자 선택</div>
        <div class="section-card-body" style="gap:8px;">
          <div style="font-size:11px;color:var(--gray-400);margin-bottom:2px;">서류를 받을 BNCT 담당자를 선택하세요</div>
          <label class="checkbox-item" id="mgr-1-wrap">
            <input type="checkbox" id="mgr-1" value="sk.kim@bnctkorea.com" data-name="김상길">
            <div class="checkbox-box" id="mgr-1-box">✓</div>
            <div>
              <div class="checkbox-label" style="font-weight:700;">김상길</div>
              <div style="font-size:10px;color:var(--gray-400);">sk.kim@bnctkorea.com</div>
            </div>
          </label>
          <label class="checkbox-item" id="mgr-2-wrap">
            <input type="checkbox" id="mgr-2" value="sun.park@bnctkorea.com" data-name="박선호">
            <div class="checkbox-box" id="mgr-2-box">✓</div>
            <div>
              <div class="checkbox-label" style="font-weight:700;">박선호</div>
              <div style="font-size:10px;color:var(--gray-400);">sun.park@bnctkorea.com</div>
            </div>
          </label>
          <label class="checkbox-item" id="mgr-3-wrap">
            <input type="checkbox" id="mgr-3" value="sw.nam@bnctkorea.com" data-name="남상우">
            <div class="checkbox-box" id="mgr-3-box">✓</div>
            <div>
              <div class="checkbox-label" style="font-weight:700;">남상우</div>
              <div style="font-size:10px;color:var(--gray-400);">sw.nam@bnctkorea.com</div>
            </div>
          </label>
        </div>
      </div>
      <button class="btn-pdf" onclick="submitForms()" id="btnPdf" style="background:linear-gradient(135deg,#2e7d32,#1b5e20);margin-top:4px;">
        제출하기
      </button>
    </div>

    <button onclick="resetAll()" style="width:100%;padding:8px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;color:var(--gray-700);font-family:inherit;">
      전체 초기화
    </button>
  </aside>

  <main class="main-content" id="mainContent">
    <!-- Welcome -->
    <div class="welcome-screen" id="welcomeScreen">
      <canvas id="bgCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.18;"></canvas>
      <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:36px;">
        <div class="logo-anim" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span style="font-family:Arial Black,sans-serif;font-size:72px;font-weight:900;color:white;letter-spacing:10px;line-height:1;">BNCT</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:4px;font-weight:300;">BUSAN NEW CONTAINER TERMINAL</span>
        </div>
        <div class="line-anim" style="width:320px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);"></div>
        <div class="title-anim" style="text-align:center;">
          <div style="font-size:32px;font-weight:900;color:white;letter-spacing:4px;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,0.2);">자산관리팀</div>
          <div style="font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:2px;font-weight:300;">안전서류 통합관리 시스템</div>
        </div>
        <div class="hint-anim" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:10px 24px;backdrop-filter:blur(8px);">
          <span style="font-size:13px;color:rgba(255,255,255,0.8);">왼쪽에서 설정 후 <strong style="color:white;">서류 생성하기</strong>를 클릭하세요</span>
        </div>
      </div>
    </div>

    <div id="formsContainer"></div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">확인</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
      <button class="btn-modal-confirm" id="modalConfirm">확인</button>
    </div>
  </div>
</div>

<script>
// ── EMAILJS ──────────────────────────────────────────────
const EMAILJS_CONFIG = {
  publicKey:  '-2DlYIfba-uSWKd-Y',
  serviceId:  'service_6j878wo',
  templateId: 'template_d7fmetm',
};
window.addEventListener('load', function() {
  if (window.emailjs) emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey });
  initParticles();
});

// ── 파티클 ───────────────────────────────────────────────
function initParticles() {
  var canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (var i = 0; i < 38; i++) {
    particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2.5+0.5, dx:(Math.random()-0.5)*0.4, dy:(Math.random()-0.5)*0.4, o:Math.random()*0.5+0.2 });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(function(p) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+p.o+')'; ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>canvas.width) p.dx*=-1;
      if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    for (var i=0;i<particles.length;i++) for (var j=i+1;j<particles.length;j++) {
      var d=Math.hypot(particles[i].x-particles[j].x,particles[i].y-particles[j].y);
      if(d<120){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='rgba(255,255,255,'+(0.12*(1-d/120))+')'; ctx.lineWidth=0.6; ctx.stroke(); }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ── 서명 패드 ────────────────────────────────────────────
function initSigPads(formId) {
  var sec=document.getElementById('section-'+formId);
  if(!sec) return;
  sec.querySelectorAll('.sig-canvas').forEach(function(canvas) {
    var ctx=canvas.getContext('2d');
    var drawing=false, lx=0, ly=0;
    ctx.strokeStyle='#1a2332'; ctx.lineWidth=1.8; ctx.lineCap='round'; ctx.lineJoin='round';
    function getPos(e) {
      var r=canvas.getBoundingClientRect();
      if(e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
      return {x:e.clientX-r.left, y:e.clientY-r.top};
    }
    canvas.addEventListener('mousedown',function(e){ drawing=true; var p=getPos(e); lx=p.x; ly=p.y; });
    canvas.addEventListener('mousemove',function(e){ if(!drawing)return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; canvas.closest('.sig-area').querySelector('.sig-label').style.display='none'; });
    canvas.addEventListener('mouseup',function(){ drawing=false; });
    canvas.addEventListener('mouseleave',function(){ drawing=false; });
    canvas.addEventListener('touchstart',function(e){ e.preventDefault(); drawing=true; var p=getPos(e); lx=p.x; ly=p.y; });
    canvas.addEventListener('touchmove',function(e){ e.preventDefault(); if(!drawing)return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; canvas.closest('.sig-area').querySelector('.sig-label').style.display='none'; });
    canvas.addEventListener('touchend',function(){ drawing=false; });
  });
}
function clearSig(btn) {
  var area=btn.closest('.sig-area');
  var canvas=area.querySelector('.sig-canvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  area.querySelector('.sig-label').style.display='';
}

async function doSubmit(recipients) {
  showLoadingOverlay(true,'PDF 생성 중...');
  document.getElementById('btnPdf').disabled=true;
  try {
    var jsPDF=window.jspdf.jsPDF;
    var pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    var sections=Array.from(document.querySelectorAll('#formsContainer .doc-section'));
    var allPages=[];
    sections.forEach(function(sec){ sec.querySelectorAll('.document-page').forEach(function(pg){ allPages.push(pg); }); });
    if(allPages.length===0) throw new Error('서류가 없습니다.');
    sections.forEach(function(s){ s.style.display='block'; });

    for(var pi=0;pi<allPages.length;pi++) {
      showLoadingOverlay(true,'PDF 변환 중... ('+(pi+1)+'/'+allPages.length+'페이지)');
      await new Promise(function(r){ setTimeout(r,30); });
      var canvas=await html2canvas(allPages[pi],{
        scale:2,useCORS:true,allowTaint:true,logging:false,backgroundColor:'#ffffff',windowWidth:794,
        onclone:function(doc){
          doc.querySelectorAll('input[type="text"],input[type="date"],input[type="time"],input[type="number"]').forEach(function(inp){
            if(inp.value){ var s=doc.createElement('span'); s.textContent=inp.value; s.style.cssText='font-size:11px;font-family:Noto Sans KR,sans-serif;display:inline-block;width:100%;'; inp.parentNode.replaceChild(s,inp); }
          });
          doc.querySelectorAll('input[type="checkbox"]').forEach(function(cb){ var s=doc.createElement('span'); s.textContent=cb.checked?'☑':'☐'; s.style.fontSize='13px'; cb.parentNode.replaceChild(s,cb); });
          doc.querySelectorAll('input[type="radio"]').forEach(function(rb){ var s=doc.createElement('span'); s.textContent=rb.checked?'●':'○'; s.style.fontSize='12px'; rb.parentNode.replaceChild(s,rb); });
        }
      });
      var imgData=canvas.toDataURL('image/jpeg',0.95);
      var pdfW=210, pdfH=(canvas.height*pdfW)/canvas.width;
      if(pi>0) pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,0,pdfW,pdfH<=297?pdfH:297);
    }

    sections.forEach(function(s){ s.style.display=s.classList.contains('active')?'block':'none'; });

    var now=new Date();
    var p2=function(n){ return String(n).padStart(2,'0'); };
    var dateStr=now.getFullYear()+'-'+p2(now.getMonth()+1)+'-'+p2(now.getDate())+' '+p2(now.getHours())+':'+p2(now.getMinutes());
    var project=document.getElementById('projectName').value||'(미입력)';
    var company=document.getElementById('companyName').value||'(미입력)';
    var workerCount=document.getElementById('workerCount').value;

    showLoadingOverlay(true,'이메일 발송 중...');
    for(var ri=0;ri<recipients.length;ri++) {
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        to_name: recipients[ri].name, to_email: recipients[ri].email,
        project_name: project, company_name: company,
        worker_count: workerCount+'명', submit_date: dateStr,
        doc_count: allPages.length+'페이지',
      });
    }

    var pdfBlob=pdf.output('blob');
    var pdfUrl=URL.createObjectURL(pdfBlob);
    var a=document.createElement('a');
    a.href=pdfUrl;
    a.download='BNCT_안전서류_'+now.getFullYear()+p2(now.getMonth()+1)+p2(now.getDate())+'_'+p2(now.getHours())+p2(now.getMinutes())+'.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

    showLoadingOverlay(false);
    showSuccessScreen(recipients,dateStr);
  } catch(e) {
    console.error(e);
    showLoadingOverlay(false);
    document.querySelectorAll('#formsContainer .doc-section').forEach(function(s){ s.style.display=s.classList.contains('active')?'block':'none'; });
    document.getElementById('btnPdf').disabled=false;
    showToast('제출 실패: '+(e.text||e.message||'알 수 없는 오류'),'error');
  }
}
